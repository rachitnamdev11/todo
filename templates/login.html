<!DOCTYPE html>

<html>
<head>

<title>User Login</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
background:#f4f4f4;
font-family:Arial;
}

.container{
width:350px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#3498db;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

a{
text-decoration:none;
color:#2ecc71;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account yet?</p>

<a href="/register">Create Account</a>

</div>

<script>

async function login(){

let username = document.getElementById("username").value
let password = document.getElementById("password").value


if(username=="" || password==""){
alert("Please enter username and password")
return
}


let res = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
password:password
})

})


let data = await res.json()


if(data.status=="success"){

location.href="/"

}

else{

alert("Invalid Login")

}

}

</script>

</body>
</html>
